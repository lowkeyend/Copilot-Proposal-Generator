name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Deploy backend to Hugging Face Space
        working-directory: backend
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              repo_id="fawadsidd17/proposal-copilot-backend",
              repo_type="space",
              folder_path=".",
              path_in_repo=".",
              commit_message="Deploy backend update",
              ignore_patterns=[
                  ".venv/**",
                  "__pycache__/**",
                  "*.log",
                  "*.err",
                  ".env",
                  ".env.*",
                  "generated/**",
                  "storage/**",
                  "qdrant_local_db/**",
              ],
          )
          PY

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy frontend to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel deploy \
            --prod \
            --yes \
            --token "$VERCEL_TOKEN" \
            --build-env NEXT_PUBLIC_API_BASE=https://fawadsidd17-proposal-copilot-backend.hf.space
