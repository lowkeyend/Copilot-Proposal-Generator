name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy backend to Railway
        working-directory: backend
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          npx @railway/cli up . \
            --service backend \
            --environment production \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --ci \
            --detach \
            --json \
            --path-as-root

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy frontend to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
        run: |
          npx vercel deploy \
            --prod \
            --yes \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_SCOPE" \
            --build-env NEXT_PUBLIC_API_BASE=https://backend-production-a3cd.up.railway.app
